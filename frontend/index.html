<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百家乐游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 登录模态框 -->
    <div class="modal" id="login-modal">
        <div class="modal-content">
            <h2>🎰 百家乐</h2>
            <div class="form-group">
                <input type="text" id="username" placeholder="用户名" />
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="密码" />
            </div>
            <div class="btn-group">
                <button class="action-btn" id="login-btn">登录</button>
                <button class="action-btn secondary" id="register-btn">注册</button>
            </div>
        </div>
    </div>

    <div class="game-container">
        <!-- 顶部状态栏 -->
        <header class="header">
            <!-- 用户信息 -->
            <div class="user-info" id="user-info" style="display: none;">
                <span>👤 <span id="username-display"></span></span>
                <button class="small-btn" id="logout-btn">登出</button>
            </div>
            
            <div class="balance-display">
                <span class="label">余额</span>
                <span class="value" id="balance">1000</span>
            </div>
            
            <h1 class="title">百家乐</h1>
            
            <!-- 倒计时显示 -->
            <div class="countdown-display">
                <span class="countdown-label">倒计时</span>
                <span class="countdown-value" id="countdown">30</span>
                <span class="status open" id="betting-status">可下注</span>
            </div>
            
            <div class="history-stats">
                <span class="stat">庄 <span id="banker-wins">0</span></span>
                <span class="stat">闲 <span id="player-wins">0</span></span>
                <span class="stat">和 <span id="tie-wins">0</span></span>
            </div>
        </header>

        <!-- 游戏桌面 -->
        <main class="table">
            <!-- 庄家区域 -->
            <div class="player-area banker-area">
                <div class="area-label">庄家</div>
                <div class="cards" id="banker-cards">
                    <div class="card-placeholder"></div>
                    <div class="card-placeholder"></div>
                    <div class="card-placeholder"></div>
                </div>
                <div class="score" id="banker-score"></div>
            </div>

            <!-- 结果显示 -->
            <div class="result-area">
                <div class="result" id="result-text">请先登录</div>
            </div>

            <!-- 闲家区域 -->
            <div class="player-area player-area-bottom">
                <div class="area-label">闲家</div>
                <div class="cards" id="player-cards">
                    <div class="card-placeholder"></div>
                    <div class="card-placeholder"></div>
                    <div class="card-placeholder"></div>
                </div>
                <div class="score" id="player-score"></div>
            </div>
        </main>

        <!-- 下注区域 -->
        <section class="betting-area">
            <div class="bet-buttons">
                <button class="bet-btn banker" data-bet="banker">
                    <span class="bet-name">庄家</span>
                    <span class="bet-odds">1:0.95</span>
                </button>
                <button class="bet-btn tie" data-bet="tie">
                    <span class="bet-name">和</span>
                    <span class="bet-odds">1:8</span>
                </button>
                <button class="bet-btn player" data-bet="player">
                    <span class="bet-name">闲家</span>
                    <span class="bet-odds">1:1</span>
                </button>
            </div>
            
            <div class="bet-controls">
                <div class="chip-buttons">
                    <button class="chip-btn" data-amount="10">10</button>
                    <button class="chip-btn" data-amount="50">50</button>
                    <button class="chip-btn" data-amount="100">100</button>
                    <button class="chip-btn" data-amount="500">500</button>
                </div>
                <div class="current-bet">
                    当前下注: <span id="current-bet">0</span>
                </div>
            </div>

            <div class="action-buttons">
                <button class="action-btn deal" id="deal-btn" disabled>开始发牌</button>
                <button class="action-btn clear" id="clear-btn">清除下注</button>
            </div>
        </section>

        <!-- 历史记录 -->
        <section class="history-area">
            <h3>历史记录</h3>
            <div class="history-list" id="history-list">
                <!-- 历史记录将动态生成 -->
            </div>
        </section>
    </div>

    <script src="game.js"></script>
</body>
</html>
